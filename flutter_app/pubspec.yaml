name: brasil_match
description: Dating app para brasileiros no exterior
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Backend - Supabase
  supabase_flutter: ^2.5.6
  
  # Routing
  go_router: ^14.2.0
  
  # UI/UX
  cached_network_image: ^3.3.1
  card_swiper: ^3.0.1
  
  # Media
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  path_provider: ^2.1.3
  path: ^1.9.0
  
  # Utils
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  
  # In-App Purchase
  in_app_purchase: ^3.2.0
  
  # Video Call (opcional)
  agora_rtc_engine: ^6.3.2
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - .env
