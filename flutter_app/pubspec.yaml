name: brasil_match
description: Dating app para brasileiros no exterior
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  
  # Routing
  go_router: ^12.1.3
  
  # UI/UX & Animations
  flutter_animate: ^4.3.0
  lottie: ^3.0.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  
  # Backend - Supabase
  supabase_flutter: ^2.0.0
  
  # In-App Purchase
  in_app_purchase: ^3.1.13
  
  # Media & Files
  image_picker: ^1.0.7
  image_cropper: ^5.0.1
  
  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Permissions
  permission_handler: ^11.1.0
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  flutter_dotenv: ^5.1.0
  
  # HTTP
  dio: ^5.4.0
  
  # Video Call (Agora)
  agora_rtc_engine: ^6.3.0
  
  # UI Components
  flutter_swiper_view: ^1.1.8
  card_swiper: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - .env

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
